<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #fff;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 6px; }
    p.subtitle { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      flex: 1; padding: 9px; border: 1px solid #2a2a2a;
      border-radius: 10px; background: transparent;
      color: #888; font-size: 0.85rem; cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { background: #fff; color: #000; border-color: #fff; font-weight: 500; }
    .section { display: none; }
    .section.active { display: block; }
    label { display: block; font-size: 0.82rem; color: #aaa; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 10px; color: #fff; font-size: 0.95rem;
      outline: none; transition: border 0.2s; margin-bottom: 14px;
    }
    input:focus { border-color: #555; }
    .btn {
      width: 100%; padding: 12px;
      border-radius: 10px; border: none;
      font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #fff; color: #000; }
    .btn-google {
      background: #1a1a1a; color: #fff;
      border: 1px solid #2a2a2a;
      display: flex; align-items: center;
      justify-content: center; gap: 10px;
      margin-top: 16px;
    }
    .divider {
      text-align: center; color: #444;
      font-size: 0.8rem; margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute;
      top: 50%; width: 42%; height: 1px;
      background: #2a2a2a;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .msg { font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 20px; }
    .msg.error { color: #ff6b6b; }
    .msg.success { color: #6bff9e; }
    #send-otp { margin-bottom: 14px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to continue</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('email')">Email</button>
    <button class="tab" onclick="switchTab('phone')">Phone</button>
  </div>

  <!-- Email/Password -->
  <div class="section active" id="tab-email">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button class="btn btn-primary" onclick="loginWithEmail()">Sign In</button>
    <div class="divider">or</div>
    <button class="btn btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.6 2.3 30.1 0 24 0 14.8 0 6.9 5.4 3 13.3l7.9 6.1C12.8 13.1 17.9 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.6 5.9c4.4-4.1 7-10.1 7-17.1z"/>
        <path fill="#FBBC05" d="M10.9 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.2.8-4.6L2.4 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8.4-6z"/>
        <path fill="#34A853" d="M24 48c6.1 0 11.2-2 14.9-5.4l-7.6-5.9c-2 1.4-4.6 2.2-7.3 2.2-6.1 0-11.2-3.6-13.1-9l-7.9 6.1C6.9 42.6 14.8 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- Phone -->
  <div class="section" id="tab-phone">
    <label>Phone number</label>
    <input type="tel" id="phone" placeholder="+91 9876543210" />
    <button class="btn btn-primary" id="send-otp" onclick="sendOTP()">Send OTP</button>
    <div id="otp-section" style="display:none;">
      <label>Enter OTP</label>
      <input type="text" id="otp" placeholder="6-digit code" maxlength="6"/>
      <button class="btn btn-primary" onclick="verifyOTP()">Verify & Sign In</button>
    </div>
    <div id="recaptcha-container"></div>
  </div>

  <p class="msg" id="msg"></p>
</div>

<script type="module">
  // ── Firebase imports ──────────────────────────────────────────
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithEmailAndPassword,
    RecaptchaVerifier,
    signInWithPhoneNumber
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ── Your config ───────────────────────────────────────────────
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDKqQceFawSykFo_TrOUIDPbRZaT7uDic8",
  authDomain: "seven-beans.firebaseapp.com",
  projectId: "seven-beans",
  storageBucket: "seven-beans.firebasestorage.app",
  messagingSenderId: "710734826838",
  appId: "1:710734826838:web:cc3639ab46ea54f61c1af7",
  measurementId: "G-XSC7ZNCHN2"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  let confirmationResult;

  // ── Helpers ───────────────────────────────────────────────────
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  // ── Tab switcher ──────────────────────────────────────────────
  window.switchTab = (tab) => {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'email') || (i === 1 && tab === 'phone'));
    });
    document.getElementById('tab-email').classList.toggle('active', tab === 'email');
    document.getElementById('tab-phone').classList.toggle('active', tab === 'phone');
    showMsg('', '');
  };

  // ── Google Login ──────────────────────────────────────────────
  window.loginWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    try {
      const result = await signInWithPopup(auth, provider);
      showMsg(`✅ Welcome, ${result.user.displayName}!`, 'success');
      window.location.href = 'home.html';
    } catch (err) {
      showMsg(err.message, 'error');
    }
  };

  // ── Email/Password Login ──────────────────────────────────────
  window.loginWithEmail = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (!email || !password) return showMsg('Please fill in all fields.', 'error');
    try {
      const result = await signInWithEmailAndPassword(auth, email, password);
      showMsg(`✅ Welcome, ${result.user.email}!`, 'success');
      // window.location.href = '/dashboard.html';
    } catch (err) {
      showMsg(err.message, 'error');
    }
  };

  // ── Phone: Send OTP ───────────────────────────────────────────
  window.sendOTP = async () => {
    const phone = document.getElementById('phone').value;
    if (!phone) return showMsg('Enter a valid phone number.', 'error');
    try {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'invisible'
      });
      confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('send-otp').style.display = 'none';
      showMsg('✅ OTP sent! Check your phone.', 'success');
    } catch (err) {
      showMsg(err.message, 'error');
    }
  };

  // ── Phone: Verify OTP ─────────────────────────────────────────
  window.verifyOTP = async () => {
    const otp = document.getElementById('otp').value;
    if (!otp) return showMsg('Enter the OTP.', 'error');
    try {
      const result = await confirmationResult.confirm(otp);
      showMsg(`✅ Verified! Welcome ${result.user.phoneNumber}`, 'success');
      // window.location.href = '/dashboard.html';
    } catch (err) {
      showMsg('Invalid OTP. Try again.', 'error');
    }
  };
</script>
</body>
</html>
